name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: myuser
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        working-directory: ./Backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django Tests
        working-directory: ./Backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: postgres
          DB_USER: myuser
          DB_PASSWORD: testpassword
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-dummy-secret-key
        run: |
          python manage.py test

  test-frontend:
    name: Frontend Build & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./Frontend/package-lock.json

      - name: Install Dependencies
        working-directory: ./Frontend
        run: npm ci

      - name: Run Build
        working-directory: ./Frontend
        run: |
          # Da in der package.json noch kein "test" Skript definiert ist, 
          # stellen wir zumindest sicher, dass die App ohne Fehler kompiliert.
          npm run build

  docker-test:
    name: Test Docker Containers
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up environment variables
        run: |
          # Wir kopieren die Vorlage, um funktionierende Fake-Credentials für den Test zu haben
          cp .env.example .env

      - name: Build and Start Containers
        run: |
          docker-compose up -d --build

      - name: Wait for Database to be Healthy
        run: |
          # Warte kurz, damit die Container vollständig hochfahren können
          sleep 15
          docker-compose ps

      - name: Verify Backend Health API
        run: |
          # Überprüft, ob das Backend unter dem Port antwortet
          curl -f http://localhost:8000/api/health/ || exit 1

      - name: Verify Frontend Webserver
        run: |
          # Überprüft, ob der Nginx läuft und die Index-Seite ausliefert
          curl -f http://localhost:80/ || exit 1

      - name: Check for Crashed Containers
        run: |
          # Prüft, ob irgendein Container abgestürzt ist ("Exit")
          if docker-compose ps | grep -q "Exit"; then
            echo "One or more containers crashed!"
            docker-compose logs
            exit 1
          fi
          echo "All containers are running perfectly!"
