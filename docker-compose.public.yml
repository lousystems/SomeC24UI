version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-my_database_name}
      POSTGRES_USER: ${POSTGRES_USER:-my_database_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-insert_your_secure_password_here}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-my_database_user} -d ${POSTGRES_DB:-my_database_name}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/lousystems/somec24ui/backend:latest
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-my_database_name}
      - DB_USER=${POSTGRES_USER:-my_database_user}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-insert_your_secure_password_here}
      - SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-fallback-key}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ghcr.io/lousystems/somec24ui/frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
